name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # required for GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint:check

      - name: Type check
        run: bun run type-check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      # ── npm ─────────────────────────────────────────────────────────────────
      - name: Publish to npm
        run: bun publish --registry=https://registry.npmjs.org --token=${{ secrets.NPM_TOKEN }} --allow-empty-directory
        env:
          BUN_CONFIG_CHECKSUM_ALGORITHM: sha256

      # ── GitHub Packages ──────────────────────────────────────────────────────
      - name: Publish to GitHub Packages
        run: bun run publish:github
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/index.mjs
            dist/index.cjs
            dist/index.d.mts
            dist/index.d.cts




