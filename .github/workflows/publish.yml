name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  # ── 1. Verify & Build ──────────────────────────────────────────────────────
  build:
    name: Verify & Build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push/replace tags

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check / replace tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ inputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "🔄 Tag $TAG already exists — replacing..."
            git push origin --delete "refs/tags/$TAG"
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Tag $TAG created"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Lint
        run: bun run lint:check

      - name: Type check
        run: bun run type-check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── 2a. Publish → npm  (parallel) ─────────────────────────────────────────
  publish-npm:
    name: Publish → npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Publish to npm
        run: bun publish --access public --tolerate-republish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          CI_PUBLISH_SKIP_VERIFY: "1"

  # ── 2b. Publish → GitHub Packages  (parallel) ─────────────────────────────
  publish-github:
    name: Publish → GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to GitHub Packages
        run: node scripts/publish-github.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. GitHub Release  (after both publishes) ──────────────────────────────
  release:
    name: GitHub Release
    needs: [publish-npm, publish-github]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/index.mjs
            dist/index.cjs
            dist/index.d.mts
            dist/index.d.cts
